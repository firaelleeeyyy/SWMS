<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Auto Variasi - Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="d-flex">
  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Global Auto Variasi</h3>
    <a href="#">Dashboard</a>
    <a href="#">Inventory</a>
    <a href="#">Analytics</a>
    <a href="#">Suppliers</a>
    <a href="#">Settings</a>
  </div>

  <!-- Main Content -->
  <div class="container-fluid p-4">
    <h2>Dashboard Admin</h2>
    <div class="row">
      <div class="col-md-3">
        <div class="card p-3">
          <h5>Total SKU Aktif</h5>
          <p>1,284</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3">
          <h5>Nilai Stok</h5>
          <p>Rp 842 Jt</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3">
          <h5>Stok Menipis</h5>
          <p>23</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card p-3">
          <h5>Perputaran Stok</h5>
          <p>8.3x</p>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card mt-4 p-3">
      <canvas id="stockChart"></canvas>
    </div>
  </div>
</div>

<script>
  const ctx = document.getElementById('stockChart');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['Week 1','Week 2','Week 3','Week 4'],
      datasets: [
        { label: 'Masuk', data: [300, 400, 350, 500], borderColor: 'green', fill: false },
        { label: 'Keluar', data: [200, 250, 300, 400], borderColor: 'red', fill: false }
      ]
    }
  });
</script>

</body>
</html>
